<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <style>
      body {
        background: linear-gradient(to right, #007bff, #00c6ff);
        color: white;
        font-family: Arial, sans-serif;
      }
      .contact-container {
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
        color: black;
      }
      .form-control {
        border-radius: 8px;
      }
      .btn-custom {
        background-color: #007bff;
        border: none;
        border-radius: 8px;
        padding: 10px 20px;
      }
      .btn-custom:hover {
        background-color: #0056b3;
      }
    </style>
  </head>
  <body>
    <div class="container mt-5">
      <h2 class="text-center mb-4">📞 Contact Us</h2>
      <div class="row justify-content-center">
        <div class="col-md-6 contact-container">
          <h2>Medi Queue</h2>
          <h2>N0.31, RS PURAM,</h2>
          <h2>COIMBATORE,</h2>
          <h2>PHONE : 98789 56789</h2>
        </div>
      </div>

      <!-- Optional Google Maps Embed -->
      <div class="row justify-content-center mt-4">
        <div class="col-md-8">
          <h4 class="text-center">📍 Our Location</h4>
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3916.153472958688!2d76.95126147482194!3d11.01684445762526!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3ba8595e5f7e0f4d%3A0xb7b3501ffb9b4c9c!2sCoimbatore%2C%20Tamil%20Nadu!5e0!3m2!1sen!2sin!4v1710593511621"
            width="100%"
            height="300"
            style="border: 0"
            allowfullscreen=""
            loading="lazy"
          >
          </iframe>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
