<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style type="text/css">
      .nav-link {
        padding: 20px;
      }
      .nav-item a:hover {
        line-height: fixed;
        font-size: 1.2em;
        color: #28acea !important;
      }

      @media (max-width: 550px) {
        .navbar-nav {
          flex-direction: column !important;
        }

        #locha {
          align-items: center;
        }
        .navbar-wrapper {
          width: 100vw;
          display: flex;
          justify-content: center;
        }
        #ulfat {
          width: 100vw;
          align-items: center;
        }
        .navbar-wrapper p {
          display: none;
        }
        .navbar-wrapper img {
          margin-left: -5%;
        }
      }
    </style>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
      /* Custom Styling */
      .navbar {
        background: linear-gradient(135deg, #007bff, #1e3c72);
        padding: 10px 20px;
      }
      .navbar-brand {
        font-size: 1.8rem;
        font-weight: bold;
        color: #fff !important;
      }
      .nav-link {
        color: #fff !important;
        font-size: 1.2rem;
        margin-right: 15px;
        transition: all 0.3s ease-in-out;
      }
      .nav-link:hover {
        color: #ffc107 !important;
        transform: scale(1.1);
      }
      .btn-custom {
        background-color: #ffc107;
        color: #000;
        font-weight: bold;
        border-radius: 20px;
        padding: 8px 15px;
        transition: 0.3s ease-in-out;
      }
      .btn-custom:hover {
        background-color: #ffdb4d;
        transform: scale(1.1);
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="#">Medi Queue</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="{% url 'home.html' %}">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'login.html' %}">Login</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'home.html' %}">Services</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'contact' %}">Contact Us</a>
            </li>
          </ul>
          <a href="#" class="btn btn-custom ms-3">Get Started</a>
        </div>
      </div>
    </nav>
  </body>
</html>
